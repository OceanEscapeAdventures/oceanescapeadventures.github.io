<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{--deep-ocean:#002B30;--sea-teal:#005B66;--turquoise:#00A8B5;--crystal-cyan:#E0F7FA;--gold-premium:#D4AF37;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--deep-ocean);color:#fff;font-family:'Montserrat',sans-serif;min-height:100vh;}
html[dir="rtl"] body{font-family:'Tajawal','Segoe UI',Tahoma,sans-serif;}
header{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:18px 5%;
  background:rgba(0,43,48,0.85);position:sticky;top:0;z-index:10;backdrop-filter:blur(8px);border-bottom:1px solid rgba(224,247,250,0.12);}
.brand{font-weight:700;font-size:18px;color:#fff;text-decoration:none;}
.brand em{color:var(--turquoise);font-style:normal;}
.hdr-right{display:flex;align-items:center;gap:14px;}
.back{color:var(--crystal-cyan);text-decoration:none;font-size:14px;border:1px solid rgba(0,168,181,0.5);padding:8px 16px;border-radius:999px;transition:background .2s;}
.back:hover{background:rgba(0,168,181,0.2);}
.lang-switch{display:inline-flex;gap:4px;border:1px solid rgba(0,168,181,0.5);border-radius:999px;padding:3px;background:rgba(255,255,255,0.08);direction:ltr;}
.lang-switch button{font:inherit;font-weight:700;font-size:13px;cursor:pointer;border:0;background:transparent;color:#fff;padding:6px 10px;border-radius:999px;}
.lang-switch button.active{background:var(--turquoise);}
.page-head{text-align:center;padding:46px 20px 8px;}
.page-head .tag{color:var(--turquoise);font-size:13px;letter-spacing:2px;text-transform:uppercase;font-weight:700;}
.page-head h1{font-size:clamp(26px,4vw,40px);margin:10px 0 8px;}
.page-head p{color:var(--crystal-cyan);opacity:0.85;max-width:640px;margin:0 auto;font-size:15px;line-height:1.7;}
.grid{max-width:1200px;margin:34px auto 60px;padding:0 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;}
.g-card{position:relative;border-radius:16px;overflow:hidden;cursor:pointer;border:1px solid rgba(224,247,250,0.12);
  box-shadow:0 10px 30px rgba(0,20,24,0.35);transition:transform .25s;}
.g-card:hover{transform:translateY(-4px);}
.g-card img{display:block;width:100%;height:240px;object-fit:cover;transition:transform .4s;}
.g-card:hover img{transform:scale(1.05);}
.g-card figcaption{position:absolute;inset-inline:0;bottom:0;padding:26px 16px 12px;font-size:14px;font-weight:600;
  background:linear-gradient(to top,rgba(0,20,24,0.85),transparent);}
.lightbox{position:fixed;inset:0;background:rgba(0,15,18,0.94);z-index:100;display:none;align-items:center;justify-content:center;flex-direction:column;padding:24px;}
.lightbox.open{display:flex;}
.lightbox img{max-width:92vw;max-height:78vh;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.6);}
.lb-cap{margin-top:14px;color:var(--crystal-cyan);font-size:15px;}
.lb-btn{position:absolute;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);color:#fff;
  width:46px;height:46px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.lb-btn:hover{background:rgba(0,168,181,0.5);}
.lb-close{top:18px;inset-inline-end:18px;}
.lb-prev{inset-inline-start:14px;top:50%;transform:translateY(-50%);}
.lb-next{inset-inline-end:14px;top:50%;transform:translateY(-50%);}
footer{text-align:center;padding:26px 20px 40px;color:rgba(255,255,255,0.45);font-size:13px;}
footer a{color:var(--turquoise);text-decoration:none;}
@media (max-width:600px){.g-card img{height:200px;}.page-head{padding-top:34px;}}
</style>
</head>
<body>
<header>
<a class="brand" href="/">Ocean Escape <em>Adventures</em></a>
<div class="hdr-right">
<div class="lang-switch"><button data-lang="ar" class="active">ع</button><button data-lang="en">EN</button></div>
<a class="back" href="/" data-en="← Back to Home" data-ar="← العودة للرئيسية">← العودة للرئيسية</a>

<div class="page-head">

<div class="lightbox" id="lb" role="dialog" aria-modal="true">
<button class="lb-btn lb-close" id="lbClose" aria-label="Close">✕</button>
<button class="lb-btn lb-prev" id="lbPrev" aria-label="Previous">‹</button>
<img id="lbImg" src="" alt=""/>
<div class="lb-cap" id="lbCap"></div>
<button class="lb-btn lb-next" id="lbNext" aria-label="Next">›</button>
</div>
<script>
(function(){
  /* language */
  var lang='ar';
  try{lang=localStorage.getItem('oea_lang')||'ar';}catch(e){}
  function setLang(l){
    lang=l;
    document.documentElement.lang=l;
    document.documentElement.dir=(l==='ar')?'rtl':'ltr';
    document.querySelectorAll('[data-en]').forEach(function(el){
      var v=el.getAttribute(l==='ar'?'data-ar':'data-en');
      if(v!==null){ if(el.tagName==='TITLE'){document.title=v;} else {el.textContent=v;} }
    });
    document.querySelectorAll('.lang-switch button').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-lang')===l);});
    try{localStorage.setItem('oea_lang',l);}catch(e){}
  }
  document.querySelectorAll('.lang-switch button').forEach(function(b){b.addEventListener('click',function(){setLang(b.getAttribute('data-lang'));});});
  setLang(lang);

  /* lightbox */
  var cards=[].slice.call(document.querySelectorAll('.g-card'));
  var lb=document.getElementById('lb'),img=document.getElementById('lbImg'),cap=document.getElementById('lbCap'),cur=0;
  function show(i){
    cur=(i+cards.length)%cards.length;
    var c=cards[cur],ci=c.querySelector('img'),cc=c.querySelector('figcaption span');
    img.src=ci.src; img.alt=ci.alt;
    cap.textContent=cc.getAttribute(lang==='ar'?'data-ar':'data-en')||cc.textContent;
    lb.classList.add('open');
  }
  cards.forEach(function(c,i){c.addEventListener('click',function(){show(i);});});
  document.getElementById('lbClose').addEventListener('click',function(){lb.classList.remove('open');});
  document.getElementById('lbPrev').addEventListener('click',function(e){e.stopPropagation();show(cur-1);});
  document.getElementById('lbNext').addEventListener('click',function(e){e.stopPropagation();show(cur+1);});
  lb.addEventListener('click',function(e){if(e.target===lb)lb.classList.remove('open');});
  document.addEventListener('keydown',function(e){
    if(!lb.classList.contains('open'))return;
    if(e.key==='Escape')lb.classList.remove('open');
    if(e.key==='ArrowLeft')show(cur-1);
    if(e.key==='ArrowRight')show(cur+1);
  });
})();
</script>
</body>
